<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>গণিত — এক পরমাণু</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background: #000000;
            color: #d4d4d4;
            line-height: 1.7;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        a { color: #a78bfa; text-decoration: none; }
        h1 { 
            font-size: 2.8em;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        ul { margin: 20px 0; padding-left: 20px; }
        li { margin: 10px 0; font-size: 1.1em; }
        .back-link { display: inline-block; margin-bottom: 30px; color: #a78bfa; }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">← হোমে ফিরে যাও</a>
    <h1>গণিত</h1>
    <p>এখানে নবম-দশম ও একাদশ-দ্বাদশ শ্রেণির গণিতের সব অধ্যায়ের নোট ও সমাধান পাওয়া যাবে।</p>
    
    <h2>নবম-দশম শ্রেণি</h2>
    <ul>
        <li>অধ্যায় ১: বাস্তব সংখ্যা</li>
        <li>অধ্যায় ২: সেট ও ফাংশন</li>
        <li>অধ্যায় ৩: বীজগাণিতিক রাশি</li>
        <!-- বাকি অধ্যায় যোগ করবে -->
    </ul>

    <h2>একাদশ-দ্বাদশ শ্রেণি</h2>
    <ul>
        <li>ম্যাট্রিক্স ও নির্ণায়ক</li>
        <li>ক্যালকুলাস</li>
        <li>ভেক্টর</li>
        <!-- বাকি অধ্যায় যোগ করবে -->
    </ul>
